name: Publish Registry

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Assemble registry
        run: python3 scripts/assemble-registry.py --output registry.md

      - name: Validate registry
        run: |
          python3 -c "
          import yaml, pathlib
          text = pathlib.Path('registry.md').read_text()
          parts = text.split('---', 2)
          meta = yaml.safe_load(parts[1])
          assert meta['schema_version'] == 2
          print(f'Registry valid: {len(meta[\"plugins\"])} plugins')
          "

      - name: Upload to CDN
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          aws s3 cp registry.md "s3://${R2_BUCKET}/plugins/registry.md" \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type "text/markdown" \
            --cache-control "public, max-age=300"
